name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) Tests — bloque le déploiement s'ils échouent
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests unitaires
        run: npm run test:unit
      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium
      - name: Tests E2E
        run: npm run test:e2e

  # 2) Déploiement — uniquement si les tests passent, et seulement sur main
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./app   # on ne publie que l'app statique (pas e2e/, node_modules, etc.)
      - id: deployment
        uses: actions/deploy-pages@v4
